name: Update Releases

on:
  schedule:
    # Daily at 06:00 UTC — keeps release data fresh without resyncing on every push.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update even if no changes detected'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  actions: write

jobs:
  update-releases:
    runs-on: ubuntu-latest
    name: Update Release Catalog
    env:
      TOOLOST_REFRESH_ENABLED: ${{ secrets.TOOLOST_CLIENT_ID != '' && secrets.TOOLOST_REFRESH_TOKEN != '' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      - name: Verify refresh-token storage access
        if: env.TOOLOST_REFRESH_ENABLED == 'true'
        env:
          GH_TOKEN: ${{ secrets.SITE_PAT }}
        run: gh api "repos/${GITHUB_REPOSITORY}/actions/secrets/public-key" > /dev/null

      - name: Refresh Too Lost access token
        if: env.TOOLOST_REFRESH_ENABLED == 'true'
        env:
          TOOLOST_CLIENT_ID: ${{ secrets.TOOLOST_CLIENT_ID }}
          TOOLOST_CLIENT_SECRET: ${{ secrets.TOOLOST_CLIENT_SECRET }}
          TOOLOST_REFRESH_TOKEN: ${{ secrets.TOOLOST_REFRESH_TOKEN }}
          TOOLOST_REFRESH_TOKEN_FILE: ${{ runner.temp }}/toolost-refresh-token
        run: npm run refresh-toolost

      - name: Save rotated Too Lost refresh token
        if: env.TOOLOST_REFRESH_ENABLED == 'true'
        env:
          GH_TOKEN: ${{ secrets.SITE_PAT }}
          TOOLOST_REFRESH_TOKEN_FILE: ${{ runner.temp }}/toolost-refresh-token
        run: gh secret set TOOLOST_REFRESH_TOKEN --repo "$GITHUB_REPOSITORY" < "$TOOLOST_REFRESH_TOKEN_FILE"

      - name: Use configured Too Lost access token
        if: env.TOOLOST_REFRESH_ENABLED != 'true'
        env:
          TOOLOST_ACCESS_TOKEN_FALLBACK: ${{ secrets.TOOLOST_ACCESS_TOKEN }}
        run: |
          if [ -n "$TOOLOST_ACCESS_TOKEN_FALLBACK" ]; then
            echo "::add-mask::$TOOLOST_ACCESS_TOKEN_FALLBACK"
            echo "TOOLOST_ACCESS_TOKEN=$TOOLOST_ACCESS_TOKEN_FALLBACK" >> "$GITHUB_ENV"
          fi
        
      - name: Update releases data
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: npm run update-releases
          
      - name: Check for changes
        id: git-check
        run: |
          git add src/data/releases.ts
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected in releases data"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected in releases data"
          fi
          
      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/data/releases.ts
          git commit -m "chore: sync release catalog"
          git push

      - name: Deploy updated site
        if: steps.git-check.outputs.changes == 'true' || github.event.inputs.force_update == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --repo "${{ github.repository }}" --ref main -f refresh_releases=false
