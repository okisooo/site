name: Deploy (Update + GitHub Pages)

on:
  push:
    branches: [ main ]
    # If the releases data or source changes we redeploy
    paths:
      - 'src/**'
      - 'package*.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      refresh_releases:
        description: 'Run Spotify releases update step'
        required: false
        default: 'false'
        type: boolean

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      # Releases data is refreshed by the scheduled update-releases workflow —
      # NOT on every push. Regular pushes build from the committed data.
      # Manual refresh: run this workflow with refresh_releases=true.
      - name: Update Spotify releases data
        if: "github.event_name == 'workflow_dispatch' && inputs.refresh_releases == 'true'"
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          if [ -z "$SPOTIFY_CLIENT_ID" ] || [ -z "$SPOTIFY_CLIENT_SECRET" ]; then
            echo "⚠️  Spotify credentials missing; skipping update step";
            exit 0;
          fi
          echo "Running update script..."
          npm run update-releases || { echo "Update script failed"; exit 1; }

      - name: Generate sitemap
        run: npm run generate-sitemap

      # Remove dynamic sitemap route (static export only)
      - name: Remove dynamic sitemap route (static export only)
        run: rm -f src/app/sitemap.xml/route.ts

      # Build always uses the working tree (updated even if not yet pushed)
      - name: Build Next.js site (static export)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Publish extensionless OAuth callback
        run: |
          mkdir -p out/api/auth/callback
          cp out/api/auth/callback.html out/api/auth/callback/index.html

      - name: Copy CNAME for GitHub Pages
        run: cp public/CNAME out/CNAME

      # Commit data update if any
      - name: Commit data update
        id: commit_data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/data/releases.ts src/data/highlights.ts
          # Proceed even if no changes
          git commit -m "chore(data): auto-update spotify releases [auto]" || echo "no_changes=true" >> $GITHUB_OUTPUT

      # Push commit only after a successful build so a failing build doesn't pollute main
      - name: Push data update commit
        if: steps.commit_data.outputs.no_changes != 'true'
        run: |
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
